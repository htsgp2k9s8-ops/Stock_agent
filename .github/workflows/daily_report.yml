name: Update OGM Report

on:
  schedule:
    # 6:00 AM UTC = 8:00 AM CEST (Mon–Fri)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # allow manual run from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OGM scan
        run: python .vscode/OGM_BASELINE_REPORT_ADV_pdf_A15.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: OGM report $(date -u '+%Y-%m-%d')"
          git push
